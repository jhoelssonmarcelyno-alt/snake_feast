name: serpent_strike
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  web_socket_channel: ^2.4.0
  flutter:
    sdk: flutter
  flame: ^1.15.0
  flame_audio: ^2.1.0
  shared_preferences: ^2.2.0
  provider: ^6.1.0
  permission_handler: ^11.0.0
  device_info_plus: ^10.0.0
  connectivity_plus: ^6.0.0

dev_dependencies:
  web_socket_channel: ^2.4.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/audio/
    - assets/images/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
